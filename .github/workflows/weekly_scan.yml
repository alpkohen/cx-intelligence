name: CX Intelligence — Weekly Deep Scan

on:
  schedule:
    # Her Pazartesi 06:30 UTC
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4.2.2

      - name: Python 3.11 kurulumu
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Haftalık derin tarama
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_SITE_NAME: ${{ secrets.NETLIFY_SITE_NAME }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LINKEDIN_ENABLED: "0"
        run: python weekly_deep_scan.py

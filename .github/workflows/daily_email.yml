name: CX Intelligence Günlük E-posta

on:
  schedule:
    # Türkiye saati 07:00 (TRT, UTC+3) ≈ 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-daily-email:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # LinkedIn önerisi ve e-posta bölümü: "1" ile açılır. "0" = kapalı.
      LINKEDIN_ENABLED: "0"
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_SITE_NAME: ${{ secrets.NETLIFY_SITE_NAME }}

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4.2.2

      - name: Python 3.11 kurulumu
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Günlük CX Intelligence çalıştır
        run: python main.py

      - name: Hata bildirimi (isteğe bağlı)
        if: failure()
        run: |
          echo "::error::CX Intelligence günlük iş akışı başarısız oldu. Günlükleri kontrol edin."
